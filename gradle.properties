org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx2048m
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# CI restores ~/.gradle (including Kotlin's incremental-compilation state)
# from a GitHub Actions cache between runs. A Kotlin daemon crash on one run
# can leave that incremental state corrupted, which then gets persisted into
# the cache and silently reused by every later run -- producing bogus
# "Unresolved reference" errors for symbols that genuinely exist. Disabling
# incremental compilation forces every CI build to compile from a clean
# slate instead of trusting cached state.
kotlin.incremental=false
