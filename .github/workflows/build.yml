name: Build APK

on:
  workflow_dispatch:   # the only way to trigger a build — no push/PR auto-runs

permissions:
  contents: write   # required so the release step can create tags/releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, needed to diff against the previous release for the changelog

      - name: Bump app version
        id: bump_version
        # Auto-bumps the human-facing versionName on every release dispatch,
        # so nobody has to remember to hand-edit app/build.gradle.kts first.
        # Rolls PATCH 0→9, then MINOR bumps and PATCH resets to 0:
        #   1.1.0 → 1.1.1 → … → 1.1.9 → 1.2.0 → 1.2.1 → …
        # MAJOR is never touched automatically — bump it by hand in
        # build.gradle.kts when you actually want a major version change.
        # This step's commit becomes the new source of truth for
        # appVersionName from here on (both for this build and every one
        # after it).
        run: |
          CURRENT=$(grep -oP 'val appVersionName = "\K[^"]+' app/build.gradle.kts)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$PATCH" -ge 9 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"

          sed -i "s/val appVersionName = \"${CURRENT}\"/val appVersionName = \"${NEW_VERSION}\"/" app/build.gradle.kts

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push origin HEAD:"${GITHUB_REF_NAME}"

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Point Gradle at the SDK
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon -PbuildNumber=${{ github.run_number }}

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scanapp-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # --- GitHub Release publishing ---
      # Builds the RELEASE variant, now signed with a real, permanent release
      # key instead of AGP's debug keystore (see the signingConfigs comment in
      # app/build.gradle.kts for why that was silently breaking installs over
      # previous releases — TL;DR: the debug keystore isn't a real file, it's
      # generated fresh per machine, and every Actions run is a fresh machine).
      #
      # RELEASE_KEYSTORE_BASE64 holds the keystore file itself, base64-encoded
      # (binary secrets can't be stored directly in repo secrets). Decoded
      # back to a real .jks file here, used only for this run, then discarded
      # along with the rest of the throwaway VM.
      - name: Decode release keystore
        run: printf '%s' "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build release APK
        run: >
          gradle assembleRelease --no-daemon
          -PbuildNumber=${{ github.run_number }}
          -PRELEASE_STORE_FILE=${{ github.workspace }}/release.keystore
          -PRELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}
          -PRELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}
          -PRELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Clean up decoded keystore
        if: always()
        run: rm -f release.keystore

      - name: Generate release tag
        id: tag
        # Uses the version this run itself just bumped to (see "Bump app
        # version" above) rather than re-reading the file, so there's no
        # chance of the tag and this build's actual versionName disagreeing.
        # UpdateChecker compares this tag numerically against
        # BuildConfig.VERSION_NAME, so the two must agree.
        run: echo "tag=v${{ steps.bump_version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        # Real commit messages since the previous tag, instead of relying
        # purely on GitHub's auto-generated notes (which just produce a bare
        # "Full Changelog: vX...vY" compare link when commits aren't behind
        # PRs). Falls back to the full log if this is the first release ever.
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's changed"
            git log "$RANGE" --no-merges --pretty=format:"- %s (%h)"
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ScanApp ${{ steps.tag.outputs.tag }}"
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
